<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meine Uhr Website</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #172033;
      color: white;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .clock-box {
      width: min(520px, 100%);
      text-align: center;
      padding: 36px 24px;
      border: 2px solid #ffffff33;
      border-radius: 8px;
      background: #ffffff12;
    }

    .label {
      margin: 0 0 12px;
      font-size: 18px;
    }

    #clock {
      margin: 0;
      font-size: 64px;
    }

    #date {
      margin: 14px 0 0;
      font-size: 20px;
      color: #d8e2f0;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="clock-box">
      <p class="label">Aktuelle Uhrzeit</p>
      <h1 id="clock">00:00:00</h1>
      <p id="date">Datum wird geladen</p>
    </section>
  </main>

  <script>
    function updateClock() {
      const now = new Date();

      const time = now.toLocaleTimeString("de-DE");
      const date = now.toLocaleDateString("de-DE", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      });

      document.querySelector("#clock").textContent = time;
      document.querySelector("#date").textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
